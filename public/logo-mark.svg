<svg viewBox="155 130 715 700" xmlns="http://www.w3.org/2000/svg">
  <!-- Star only, transparent bg — for use on dark backgrounds -->
  <defs>
    <linearGradient id="starFill" x1="10%" y1="4%" x2="90%" y2="96%">
      <stop offset="0%"   stop-color="#c084fc"/>
      <stop offset="28%"  stop-color="#9333ea"/>
      <stop offset="62%"  stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0%" y1="0%" x2="58%" y2="100%">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.30)"/>
      <stop offset="40%"  stop-color="rgba(255,255,255,0.06)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <polygon
    points="512,142 599,392 864,398 653,558 730,811 512,660 295,811 371,558 160,398 425,392"
    fill="url(#starFill)"
    filter="url(#glow)"
  />
  <polygon
    points="512,142 599,392 864,398 653,558 730,811 512,660 295,811 371,558 160,398 425,392"
    fill="url(#sheen)"
  />
  <polygon
    points="512,142 599,392 864,398 653,558 730,811 512,660 295,811 371,558 160,398 425,392"
    fill="none" stroke="rgba(255,255,255,0.20)" stroke-width="4"
  />
</svg>
